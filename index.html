<script>

const correo="sd_carauco@duoc.cl";


function abrirGmailIOS(){

    // Método que funciona mejor en iPhone
    window.location.href="googlegmail://co?to="+correo;


    // Respaldo si Gmail no está instalado
    setTimeout(function(){

        window.location.href="https://apps.apple.com/app/gmail-email-by-google/id422689480";

    },2000);

}



function abrirGmailAndroid(){

    // Método Android
    window.location.href="googlegmail://co?to="+correo;


    // Respaldo Gmail Web
    setTimeout(function(){

        window.location.href="https://mail.google.com/mail/?view=cm&fs=1&to="+correo;

    },2000);

}



function abrirGmailWeb(){

    window.location.href="https://mail.google.com/mail/?view=cm&fs=1&to="+correo;

}



window.onload=function(){


let ua=navigator.userAgent.toLowerCase();

let mensaje=document.getElementById("mensaje");
let boton=document.getElementById("botonGmail");



// iPhone / iPad

if(ua.includes("iphone") || ua.includes("ipad")){


    mensaje.innerHTML="🍎 Detectamos iPhone<br><br>Presione para abrir Gmail";

    boton.innerHTML="Abrir aplicación Gmail";


    boton.onclick=function(){

        abrirGmailIOS();

    };


}



// Android

else if(ua.includes("android")){


    mensaje.innerHTML="📱 Detectamos Android<br><br>Presione para abrir Gmail";

    boton.innerHTML="Abrir aplicación Gmail";


    boton.onclick=function(){

        abrirGmailAndroid();

    };


}



// PC

else{


    mensaje.innerHTML="💻 Abra Gmail desde el navegador";

    boton.innerHTML="Abrir Gmail Web";


    boton.onclick=function(){

        abrirGmailWeb();

    };


}



};


</script>
