<script>
window.onload = function() {

    const correo = "sd_carauco@duoc.cl";

    const esIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (esIOS) {

        // Abrir Gmail App en iPhone
        window.location.href =
        "googlegmail://co?to=" + correo;

        // Respaldo Gmail Web
        setTimeout(function(){

            window.location.href =
            "https://mail.google.com/mail/?view=cm&fs=1&to="
            + correo;

        },1500);

    } else {

        // Android y PC
        window.location.href =
        "https://mail.google.com/mail/?view=cm&fs=1&to="
        + correo;

    }

};
</script>
